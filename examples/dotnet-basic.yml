# Example: Basic .NET Build
# Copy this to your repo's .github/workflows/build.yml

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner to use'
        type: choice
        default: 'ubuntu-latest'
        options:
          - ubuntu-latest
          - cps-cent-runner-nonprod

jobs:
  # Build on GitHub-hosted runner (auto-installs .NET)
  build:
    uses: CPS-Innovation/CPS-Centralised-Reusable-Workflows/.github/workflows/dotnet-build.yml@v1
    with:
      runner: ${{ inputs.runner || 'cps-cent-runner-nonprod' }}
      dotnet-version: '8.0.x'
      solution-file: 'src/MyApplication.sln'
      configuration: 'Release'
      run-tests: false
      use-github-packages: true
      timeout: 15
