name: Terraform Destroy (Reusable)

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner to use'
        type: string
        default: 'cps-cent-runner-nonprod'
      working-directory:
        description: 'Terraform working directory'
        type: string
        default: '.'
      var-file:
        description: 'Path to tfvars file'
        type: string
        required: true
      environment:
        description: 'GitHub environment for approval gates'
        type: string
        required: true
      state-resource-group:
        description: 'Resource group containing state storage account'
        type: string
        required: true
      state-storage-account:
        description: 'Storage account name for tfstate'
        type: string
        required: true
      state-container:
        description: 'Storage container for tfstate'
        type: string
        default: 'tfstate'
      state-key:
        description: 'State file name (e.g., nonprod.tfstate)'
        type: string
        required: true
      timeout:
        description: 'Job timeout in minutes'
        type: number
        default: 30
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

jobs:
  destroy:
    name: 'Terraform Destroy'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout }}
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init & Destroy
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: |
          terraform version

          terraform init -reconfigure \
            -backend-config="subscription_id=$ARM_SUBSCRIPTION_ID" \
            -backend-config="tenant_id=$ARM_TENANT_ID" \
            -backend-config="resource_group_name=${{ inputs.state-resource-group }}" \
            -backend-config="storage_account_name=${{ inputs.state-storage-account }}" \
            -backend-config="container_name=${{ inputs.state-container }}" \
            -backend-config="key=${{ inputs.state-key }}"

          echo "Planning destruction of resources..."
          terraform plan -destroy -var-file=${{ inputs.var-file }} -no-color

          terraform destroy -auto-approve -var-file=${{ inputs.var-file }}
