name: Terraform Plan (Reusable)

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner to use'
        type: string
        default: 'cps-cent-runner-nonprod'
      working-directory:
        description: 'Terraform working directory'
        type: string
        default: '.'
      var-file:
        description: 'Path to tfvars file'
        type: string
        required: true
      environment:
        description: 'Environment name (for artifact naming)'
        type: string
        required: true
      state-resource-group:
        description: 'Resource group containing state storage account'
        type: string
        required: true
      state-storage-account:
        description: 'Storage account name for tfstate'
        type: string
        required: true
      state-container:
        description: 'Storage container for tfstate'
        type: string
        default: 'tfstate'
      state-key:
        description: 'State file name (e.g., nonprod.tfstate)'
        type: string
        required: true
      timeout:
        description: 'Job timeout in minutes'
        type: number
        default: 30
    outputs:
      has_changes:
        description: 'Whether terraform plan detected changes'
        value: ${{ jobs.plan.outputs.has_changes }}
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_SUBSCRIPTION_ID_STATE:
        description: 'Optional: Subscription ID for state storage (defaults to AZURE_SUBSCRIPTION_ID)'
        required: false

jobs:
  plan:
    name: 'Terraform Plan'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout }}
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure CLI script
        shell: bash
        run: az account show

      - name: Terraform Init & Plan
        id: plan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_STATE: ${{ secrets.AZURE_SUBSCRIPTION_ID_STATE || secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: |
          terraform version

          terraform init -reconfigure \
            -backend-config="subscription_id=$ARM_SUBSCRIPTION_ID_STATE" \
            -backend-config="tenant_id=$ARM_TENANT_ID" \
            -backend-config="resource_group_name=${{ inputs.state-resource-group }}" \
            -backend-config="storage_account_name=${{ inputs.state-storage-account }}" \
            -backend-config="container_name=${{ inputs.state-container }}" \
            -backend-config="key=${{ inputs.state-key }}"

          terraform validate

          PLAN_OUTPUT=$(terraform plan -var-file=${{ inputs.var-file }} -no-color -out=tfplan 2>&1)
          echo "$PLAN_OUTPUT"

          if echo "$PLAN_OUTPUT" | grep -q "No changes"; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload Plan Artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_number }}
          path: ${{ inputs.working-directory }}/tfplan
          retention-days: 5
