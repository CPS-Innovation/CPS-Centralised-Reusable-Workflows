name: Terraform Plan (Reusable)

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner to use'
        type: string
        default: 'cps-cent-runner-nonprod'
      working-directory:
        description: 'Terraform working directory'
        type: string
        default: '.'
      terraform-version:
        description: 'Terraform version'
        type: string
        default: '1.10.0'
      environment:
        description: 'Environment name (nonprod/prod)'
        type: string
        required: true
      var-file:
        description: 'Path to tfvars file'
        type: string
        default: ''
      timeout:
        description: 'Job timeout in minutes'
        type: number
        default: 30
      run-tflint:
        description: 'Run TFLint'
        type: boolean
        default: true
      run-tfsec:
        description: 'Run tfsec security scan'
        type: boolean
        default: true
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_CLIENT_SECRET:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ARM_TENANT_ID:
        required: true

jobs:
  plan:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout }}

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        if: startsWith(inputs.runner, 'ubuntu') || startsWith(inputs.runner, 'windows') || startsWith(inputs.runner, 'macos')
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Verify Terraform Version
        run: terraform version

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: TFLint
        if: inputs.run-tflint
        run: tflint --init && tflint

      - name: Tfsec Security Scan
        if: inputs.run-tfsec
        run: tfsec . --minimum-severity HIGH

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          if [ -n "${{ inputs.var-file }}" ]; then
            terraform plan -var-file="${{ inputs.var-file }}" -out=tfplan
          else
            terraform plan -out=tfplan
          fi

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_number }}
          path: ${{ inputs.working-directory }}/tfplan
